    <style>
        /* Scoped overrides for the tournament fallback page.
           Re-uses the .download-page / .download-hero recipe (centred column,
           wordmark reset, editorial typography) and adds:
           - a stacked two-CTA layout (lime primary + dark secondary)
           - an optional monospace ID chip below the title
           - a minimal in-flow footer.
           No tokens introduced; only spacing + the lime/dark CTAs which mirror
           the accent button + .download-back recipes already in styles.css. */
        .tournament-id {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.8125rem;
            color: var(--color-medium-gray);
            background: rgba(16, 24, 40, 0.04);
            padding: 6px 12px;
            border-radius: 8px;
            word-break: break-all;
            max-width: 100%;
            margin: 0;
        }

        .tournament-ctas {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            width: 100%;
            max-width: 320px;
            margin-top: clamp(12px, 2vh, 24px);
        }

        /* Lime primary CTA — uses the brand accent token, black text.
           Mirrors the .download-back geometry but with the lime fill. */
        .tournament-cta-primary,
        .tournament-cta-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: clamp(12px, 1.4vh, 16px) clamp(20px, 2.5vw, 32px);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: clamp(0.9rem, 1vw, 1rem);
            text-decoration: none;
            border-radius: var(--radius-pill);
            transition:
                background-color 220ms cubic-bezier(0.4, 0, 0.2, 1),
                color 220ms cubic-bezier(0.4, 0, 0.2, 1),
                transform 220ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tournament-cta-primary {
            background-color: var(--color-accent);
            color: var(--color-text-primary);
        }

        .tournament-cta-primary:hover {
            transform: translateY(-1px);
            background-color: #C8EE00;
        }

        .tournament-cta-primary:focus-visible {
            outline: 2px solid var(--color-text-primary);
            outline-offset: 3px;
        }

        .tournament-cta-secondary {
            background-color: var(--color-text-primary);
            color: var(--color-text-white);
        }

        .tournament-cta-secondary:hover {
            background-color: var(--color-button-glass-hover);
        }

        .tournament-cta-secondary:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 3px;
        }

        /* Minimal in-flow footer — small Inter line centred at the bottom of
           the page. Re-uses .download-page's flex column layout so the footer
           sits naturally below the hero. */
        .tournament-footer {
            font-family: var(--font-body);
            font-size: 0.8125rem;
            color: var(--color-medium-gray);
            margin: 0;
        }

        .tournament-footer a {
            color: var(--color-medium-gray);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .tournament-footer a:hover {
            color: var(--color-text-primary);
        }
    </style>
</head>
<body>

<main class="download-page">
    <a class="wordmark wordmark-link" href="../" aria-label="Retour à l'accueil Yamatch">

    <section class="download-hero" aria-labelledby="tournamentTitle">

            Pour rejoindre ce tournoi, ouvre Yamatch.

</main>

<script>
    // TODO once App Store + Play Store links are available :
    // - Replace the fallbackUrl = '/download/' line in joinTournament() with
    //   platform-specific URLs :
    //   - iOS : https://apps.apple.com/app/yamatch/id<APP_ID>  (waiting App Store approval)
    //   - Android : https://play.google.com/store/apps/details?id=com.appyamatch.yamatch  (waiting Play Store publication)
    // - Detection via UA sniffing :
    //   const ua = navigator.userAgent;
    //   if (/iPhone|iPad|iPod/i.test(ua)) fallbackUrl = '<iOS_STORE_URL>';
    //   else if (/Android/i.test(ua)) fallbackUrl = '<ANDROID_STORE_URL>';
    //   else fallbackUrl = '/download/';
    (function () {
        // Extrait l'ID du tournoi depuis la query string (?id=<id>, posé par
        // le bounce 404.html) ou depuis le path (cas d'un hit direct sur
        // /tournament/<id>).
        function readTournamentId() {
            var params = new URLSearchParams(window.location.search);
            var fromQuery = params.get('id');
            if (fromQuery && fromQuery.trim().length > 0) {
                return fromQuery.trim();
            }
            // /tournament/<id> direct hit (unlikely on GitHub Pages without
            // a real file, but safe-guard for future hosting changes).
            var path = window.location.pathname.replace(/\/+$/, '');
            var match = path.match(/\/tournament\/(.+)$/);
            if (match && match[1]) {
                return decodeURIComponent(match[1]);
            }
            return null;
        }

        // Garde permissive — accepte UUIDs, slugs, tokens alphanumériques.
        // Rejette tout ce qui contient espace ou slash.
        function isValidId(value) {
            if (!value) return false;
            if (value.length > 128) return false;
            return /^[A-Za-z0-9_\-]+$/.test(value);
        }

        var id = readTournamentId();
        var idValid = isValidId(id);

        var idEl = document.getElementById('tournamentId');
        var bodyEl = document.getElementById('tournamentBody');
        var openInAppLink = document.getElementById('openInApp');

        if (idValid) {
            idEl.textContent = id;
            idEl.hidden = false;
        } else {
            // Mode générique — pas de tournoi spécifique référencé.
            bodyEl.textContent = "Cette page est destinée à l'ouverture d'un tournoi spécifique depuis un partage.";
        }

        // Smart deep link : tente d'ouvrir l'app via le schéma custom ; si
        // après 1.5s la page est toujours visible (= app non installée /
        // schéma non intercepté), redirige vers /download/.
        //
        // Le flag `didLeavePage` est crucial : iOS bascule l'onglet Safari
        // en background quand l'app intercepte le schéma → l'événement
        // `visibilitychange` se déclenche avec `hidden` → on sait qu'il NE
        // faut PAS rediriger vers la page de téléchargement.
        function joinTournament(targetId) {
            if (!isValidId(targetId)) return; // safety
            var appUrl = 'com.appyamatch.yamatch://tournament/' + encodeURIComponent(targetId);
            var fallbackUrl = '/download/';
            var didLeavePage = false;

            function handleVisibilityChange() {
                if (document.visibilityState === 'hidden') {
                    didLeavePage = true;
                }
            }
            function handlePageHide() {
                didLeavePage = true;
            }

            document.addEventListener('visibilitychange', handleVisibilityChange);
            window.addEventListener('pagehide', handlePageHide);

            // Déclenche la navigation vers le schéma custom — iOS / Android
            // interceptent et ouvrent l'app si installée. On ne peut PAS
            // utiliser https://appyamatch.fr/... car iOS ne déclenche les
            // Universal Links que quand l'origine diffère du domaine cible
            // (by-design Apple).
            window.location.href = appUrl;

            // Après 1.5s, si on est toujours sur la page (app pas installée),
            // redirige vers /download/. Cleanup systématique des listeners.
            window.setTimeout(function () {
                document.removeEventListener('visibilitychange', handleVisibilityChange);
                window.removeEventListener('pagehide', handlePageHide);
                if (!didLeavePage && document.visibilityState === 'visible') {
                    window.location.href = fallbackUrl;
                }
            }, 1500);
        }

        if (idValid) {
            var appUrl = 'com.appyamatch.yamatch://tournament/' + encodeURIComponent(id);
            openInAppLink.setAttribute('href', appUrl);
            openInAppLink.setAttribute('target', '_self');

            openInAppLink.addEventListener('click', function (evt) {
                evt.preventDefault();
                joinTournament(id);
            });
        } else {
            // Pas d'ID valide → on désactive le CTA proprement (visuellement
            // grisé + bloqué aux interactions + signalé à l'a11y).
            openInAppLink.setAttribute('href', '#');
            openInAppLink.setAttribute('aria-disabled', 'true');
            openInAppLink.setAttribute('role', 'link');
            openInAppLink.setAttribute('tabindex', '-1');
            openInAppLink.style.opacity = '0.5';
            openInAppLink.style.pointerEvents = 'none';
            openInAppLink.style.cursor = 'not-allowed';

            openInAppLink.addEventListener('click', function (evt) {
                evt.preventDefault();
            });
        }
    })();
</script>
