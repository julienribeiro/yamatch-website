    <!-- Universal Link bounce: /tournament/<id> and /invite/<token> have no
         real file on GitHub Pages, so they land here (404.html). We redirect
         to the canonical /tournament/?id=<id> or /invite/?token=<token>
         fallback page before any pixel is painted.
         The redirect preserves the ID / token so the target index.html can
         resolve it from the query string. Mirrors the AASA paths
         /tournament/* + /invite/* and the in-app deep link handler.
         Same-domain `replace` so the 404 URL is not kept in history. -->
    <script>
        (function () {
            var path = window.location.pathname;
            var tournamentMatch = path.match(/^\/tournament\/([^\/]+)\/?$/);
            if (tournamentMatch && tournamentMatch[1]) {
                var id = decodeURIComponent(tournamentMatch[1]);
                window.location.replace('/tournament/?id=' + encodeURIComponent(id));
                return;
            }
            var inviteMatch = path.match(/^\/invite\/([^\/]+)\/?$/);
            if (inviteMatch && inviteMatch[1]) {
                var token = decodeURIComponent(inviteMatch[1]);
                window.location.replace('/invite/?token=' + encodeURIComponent(token));
            }
        })();
    </script>
