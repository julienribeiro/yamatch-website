    <style>
        /* Scoped overrides for the referee-invite fallback page.
           Re-uses the .download-page / .download-hero recipe (centred column,
           wordmark reset, editorial typography) and adds:
           - a stacked single-CTA layout (lime primary)
           - a minimal in-flow footer.
           No tokens introduced; only spacing + the lime CTA which mirrors
           the accent button recipe already in styles.css. Mirrors the
           owner-transfer + org-invite + team invite + tournament fallback
           pages for visual consistency.

           Unlike owner-transfer, this page does NOT depend on a fetch: the
           content is generic (no preview RPC guaranteed for the referee
           token). The CTA is enabled immediately once the token is valid. */

        .invite-ctas {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            width: 100%;
            max-width: 320px;
            margin-top: clamp(12px, 2vh, 24px);
        }

        /* Lime primary CTA — uses the brand accent token, black text.
           Mirrors the .download-back geometry but with the lime fill. */
        .invite-cta-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: clamp(12px, 1.4vh, 16px) clamp(20px, 2.5vw, 32px);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: clamp(0.9rem, 1vw, 1rem);
            text-decoration: none;
            border-radius: var(--radius-pill);
            background-color: var(--color-accent);
            color: var(--color-text-primary);
            transition:
                background-color 220ms cubic-bezier(0.4, 0, 0.2, 1),
                color 220ms cubic-bezier(0.4, 0, 0.2, 1),
                transform 220ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .invite-cta-primary:hover {
            transform: translateY(-1px);
            background-color: #C8EE00;
        }

        .invite-cta-primary:focus-visible {
            outline: 2px solid var(--color-text-primary);
            outline-offset: 3px;
        }

        /* Minimal in-flow footer — small Inter line centred at the bottom of
           the page. Re-uses .download-page's flex column layout so the footer
           sits naturally below the hero. */
        .invite-footer {
            font-family: var(--font-body);
            font-size: 0.8125rem;
            color: var(--color-medium-gray);
            margin: 0;
        }

        .invite-footer a {
            color: var(--color-medium-gray);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .invite-footer a:hover {
            color: var(--color-text-primary);
        }
    </style>
</head>
<body>

<main class="download-page">
    <a class="wordmark wordmark-link" href="../" aria-label="Retour à l'accueil Yamatch">
        <svg viewBox="0 0 1067.73 206.13" aria-hidden="true" focusable="false">

    <section class="download-hero" aria-labelledby="inviteTitle">
        <p class="download-eyebrow">Invitation arbitre</p>
        <h1 id="inviteTitle" class="download-title">Tu es invité à arbitrer un match</h1>

            Ouvre Yamatch pour voir les équipes et accepter d'arbitrer ce match.
        </p>

        <div class="invite-ctas">
            <a id="openInApp" class="invite-cta-primary" href="#" aria-disabled="true">Ouvrir dans Yamatch</a>

<script>
    // TODO once App Store + Play Store links are available :
    // - Replace the fallbackUrl = '/download/' line in openReferee() with
    //   platform-specific URLs :
    //   - iOS : https://apps.apple.com/app/yamatch/id<APP_ID>  (waiting App Store approval)
    //   - Android : https://play.google.com/store/apps/details?id=com.appyamatch.yamatch  (waiting Play Store publication)
    // - Detection via UA sniffing :
    //   const ua = navigator.userAgent;
    //   if (/iPhone|iPad|iPod/i.test(ua)) fallbackUrl = '<iOS_STORE_URL>';
    //   else if (/Android/i.test(ua)) fallbackUrl = '<ANDROID_STORE_URL>';
    //   else fallbackUrl = '/download/';
    (function () {
        // Extrait le token depuis la query string (?token=<token>, posé par
        // le bounce 404.html) ou depuis le path (cas d'un hit direct sur
        // /referee/<token>).
        function readRefereeToken() {
            var params = new URLSearchParams(window.location.search);
            var fromQuery = params.get('token');
            if (fromQuery && fromQuery.trim().length > 0) {
                return fromQuery.trim();
            }
            // /referee/<token> direct hit (unlikely on GitHub Pages without a
            // real file, but safe-guard for future hosting changes).
            var path = window.location.pathname.replace(/\/+$/, '');
            var match = path.match(/\/referee\/(.+)$/);
            if (match && match[1]) {
                return decodeURIComponent(match[1]);
            }
            return null;
        }

        // Garde permissive — accepte UUIDs (alphanumérique + tirets).
        // Rejette tout ce qui contient espace, slash ou autres caractères.
        function isValidToken(value) {
            if (!value) return false;
            if (value.length > 128) return false;
            return /^[A-Za-z0-9\-]+$/.test(value);
        }

        var titleEl = document.getElementById('inviteTitle');
        var bodyEl = document.getElementById('inviteBody');
        var openInAppLink = document.getElementById('openInApp');

        // Disable the CTA (visual grey + a11y signal + no-op handler). Used
        // for the invalid-token state only.
        function disableCta() {
            openInAppLink.setAttribute('href', '#');
            openInAppLink.setAttribute('aria-disabled', 'true');
            openInAppLink.setAttribute('role', 'link');
            openInAppLink.setAttribute('tabindex', '-1');
            openInAppLink.style.opacity = '0.5';
            openInAppLink.style.pointerEvents = 'none';
            openInAppLink.style.cursor = 'not-allowed';
        }

        function enableCta(targetToken) {
            var appUrl = 'com.appyamatch.yamatch://referee/' + encodeURIComponent(targetToken);
            openInAppLink.setAttribute('href', appUrl);
            openInAppLink.setAttribute('target', '_self');
            openInAppLink.setAttribute('aria-disabled', 'false');
            openInAppLink.removeAttribute('tabindex');
            openInAppLink.style.opacity = '';
            openInAppLink.style.pointerEvents = '';
            openInAppLink.style.cursor = '';
            openInAppLink.addEventListener('click', function (evt) {
                evt.preventDefault();
                openReferee(targetToken);
            });
        }

        // Render helpers — always go through textContent (XSS-safe).
        function setTitleText(text) {
            titleEl.textContent = text;
        }
        function setBodyText(text) {
            bodyEl.textContent = text;
        }

        // ---------- Render states ----------
        function renderInvalidLink() {
            setTitleText('Invitation arbitre');
            setBodyText("Lien d'invitation invalide ou expiré.");
            disableCta();
        }

        // ---------- Smart deep link ----------
        // Smart deep link : tente d'ouvrir l'app via le schéma custom ; si
        // après 1.5s la page est toujours visible (= app non installée /
        // schéma non intercepté), redirige vers /download/.
        //
        // Le flag `didLeavePage` est crucial : iOS bascule l'onglet Safari
        // en background quand l'app intercepte le schéma → l'événement
        // `visibilitychange` se déclenche avec `hidden` → on sait qu'il NE
        // faut PAS rediriger vers la page de téléchargement.
        function openReferee(targetToken) {
            if (!isValidToken(targetToken)) return; // safety
            var appUrl = 'com.appyamatch.yamatch://referee/' + encodeURIComponent(targetToken);
            var fallbackUrl = '/download/';
            var didLeavePage = false;

            function handleVisibilityChange() {
                if (document.visibilityState === 'hidden') {
                    didLeavePage = true;
                }
            }
            function handlePageHide() {
                didLeavePage = true;
            }

            document.addEventListener('visibilitychange', handleVisibilityChange);
            window.addEventListener('pagehide', handlePageHide);

            // Déclenche la navigation vers le schéma custom — iOS / Android
            // interceptent et ouvrent l'app si installée. On ne peut PAS
            // utiliser https://appyamatch.fr/... car iOS ne déclenche les
            // Universal Links que quand l'origine diffère du domaine cible
            // (by-design Apple).
            window.location.href = appUrl;

            // Après 1.5s, si on est toujours sur la page (app pas installée),
            // redirige vers /download/. Cleanup systématique des listeners.
            window.setTimeout(function () {
                document.removeEventListener('visibilitychange', handleVisibilityChange);
                window.removeEventListener('pagehide', handlePageHide);
                if (!didLeavePage && document.visibilityState === 'visible') {
                    window.location.href = fallbackUrl;
                }
            }, 1500);
        }

        // ---------- Orchestration ----------
        // La page est robuste et générique : on ne dépend PAS d'un fetch.
        // Si le token est valide, le CTA est activé immédiatement. Pas de
        // preview RPC garantie côté public pour le token arbitre.
        var token = readRefereeToken();
        if (!isValidToken(token)) {
            renderInvalidLink();
            return;
        }
        enableCta(token);
    })();
</script>

</body>
